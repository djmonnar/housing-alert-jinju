name: Daily Jinju Housing Alert

on:
  schedule:
    # 09:00 KST
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  alert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run housing alert
        env:
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          KAKAO_REDIRECT_URI: ${{ secrets.KAKAO_REDIRECT_URI }}
          KAKAO_WEB_LINK_URL: ${{ secrets.KAKAO_WEB_LINK_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4.1-mini' }}
          DRY_RUN: ${{ vars.DRY_RUN || 'false' }}
          LOG_LEVEL: INFO
        run: python main.py

      - name: Persist seen posts
        if: success()
        run: |
          if [ -n "$(git status --porcelain data/seen_posts.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/seen_posts.json
            git commit -m "Update seen housing posts"
            git push
          else
            echo "No seen_posts.json changes"
          fi
